<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logistics Flow</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: #fff;
  }

  header {
    height: 56px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 16px;
    letter-spacing: 2px;
  }

  header span {
    color: #E84525;
  }

  .hint {
    font-size: 12px;
    color: #999;
  }

  .diagram-wrapper {
    position: relative;
    width: 100%;
    max-width: 1600px;
    margin: 24px auto;
    padding: 0 24px;
  }

  .diagram-container {
    position: relative;
    width: 100%;
  }

  .diagram-container img {
    width: 100%;
    display: block;
    border-radius: 6px;
  }

  .hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 4px;
  }

  .hotspot:hover,
  .hotspot.active {
    background: rgba(232, 69, 37, 0.16);
    outline: 2px solid rgba(232, 69, 37, 0.75);
  }

  /* DEBUG MODE: hotspotları görmek için açık bırak, bitince kapat */
  .hotspot {
    border: 2px solid red;
    background: rgba(255, 0, 0, 0.12);
  }

  #popup {
    display: none;
    position: fixed;
    width: 360px;
    max-height: 80vh;
    overflow-y: auto;
    z-index: 999;
    background: #1a1a1a;
    border: 1px solid rgba(232,69,37,0.45);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .popup-header {
    padding: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .bo-tag {
    display: inline-block;
    color: #E84525;
    background: rgba(232,69,37,0.12);
    border: 1px solid rgba(232,69,37,0.35);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 8px;
  }

  .popup-title {
    font-size: 17px;
    font-weight: bold;
    line-height: 1.3;
  }

  .close-btn {
    background: none;
    border: none;
    color: #aaa;
    font-size: 22px;
    cursor: pointer;
  }

  .popup-body {
    padding: 16px;
  }

  .popup-summary {
    color: #ccc;
    line-height: 1.5;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .ddp-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .ddp-item {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .ddp-header {
    padding: 10px;
    cursor: pointer;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .ddp-code {
    color: #E84525;
    font-weight: bold;
    font-size: 12px;
    white-space: nowrap;
  }

  .ddp-name {
    color: #ddd;
    font-size: 13px;
    flex: 1;
  }

  .ddp-detail {
    display: none;
    padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    color: #aaa;
    font-size: 13px;
    line-height: 1.5;
    background: rgba(0,0,0,0.25);
  }

  .ddp-item.open .ddp-detail {
    display: block;
  }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 998;
  }
</style>
</head>

<body>

<header>
  <h1>LOGISTICS <span>FLOW</span></h1>
  <div class="hint">Click any process box to explore</div>
</header>

<div class="diagram-wrapper">
  <div class="diagram-container" id="diagramContainer">

    <img src="flow.png" alt="Logistics Flow Diagram" />

    <!-- HOTSPOTS: Buradaki left/top/width/height değerlerini sen ayarlayabilirsin -->

    <div class="hotspot" data-id="customer-contact" style="left:25.9%; top:11.3%; width:6.1%; height:9.4%;"></div>
    <div class="hotspot" data-id="automatic-prepping" style="left:33.6%; top:11.3%; width:6.4%; height:9.4%;"></div>
    <div class="hotspot" data-id="appointment-scheduled" style="left:41.0%; top:11.3%; width:6.2%; height:9.4%;"></div>
    <div class="hotspot" data-id="atp-check-ic" style="left:45.6%; top:7.8%; width:6.2%; height:3.0%;"></div>

    <div class="hotspot" data-id="manual-prepping" style="left:41.0%; top:25.9%; width:6.2%; height:9.4%;"></div>
    <div class="hotspot" data-id="atp-check-bo" style="left:45.8%; top:25.0%; width:6.2%; height:3.1%;"></div>
    <div class="hotspot" data-id="sps" style="left:53.4%; top:25.9%; width:6.2%; height:9.4%;"></div>
    <div class="hotspot" data-id="escalation-bo" style="left:58.2%; top:25.1%; width:6.2%; height:3.0%;"></div>
    <div class="hotspot" data-id="appointment-rescheduling" style="left:70.8%; top:26.0%; width:6.2%; height:9.3%;"></div>
    <div class="hotspot" data-id="follow-up-appointment" style="left:70.8%; top:40.0%; width:6.2%; height:9.2%;"></div>

    <div class="hotspot" data-id="spare-part-delivery" style="left:53.4%; top:54.0%; width:6.2%; height:9.0%;"></div>
    <div class="hotspot" data-id="escalation-logistics" style="left:58.2%; top:52.4%; width:6.2%; height:4.1%;"></div>

    <div class="hotspot" data-id="parts-delivered" style="left:53.4%; top:71.3%; width:6.2%; height:9.5%;"></div>
    <div class="hotspot" data-id="part-missing" style="left:70.7%; top:71.3%; width:6.2%; height:9.5%;"></div>
    <div class="hotspot" data-id="customer-visit" style="left:53.4%; top:84.2%; width:6.2%; height:9.5%;"></div>
    <div class="hotspot" data-id="repair" style="left:62.1%; top:84.2%; width:6.1%; height:9.5%;"></div>
    <div class="hotspot" data-id="consumption" style="left:70.7%; top:84.2%; width:6.2%; height:9.5%;"></div>
    <div class="hotspot" data-id="unused-return" style="left:84.4%; top:78.0%; width:6.1%; height:5.0%;"></div>
    <div class="hotspot" data-id="send-back-factory" style="left:84.4%; top:90.0%; width:6.1%; height:4.5%;"></div>

  </div>
</div>

<div id="overlay"></div>

<div id="popup">
  <div class="popup-header">
    <div>
      <div class="bo-tag" id="popupBO"></div>
      <div class="popup-title" id="popupTitle"></div>
    </div>
    <button class="close-btn" id="closeBtn">&times;</button>
  </div>

  <div class="popup-body">
    <p class="popup-summary" id="popupSummary"></p>
    <div class="ddp-label">Related DDPs</div>
    <div id="ddpList"></div>
  </div>
</div>

<script>
/*
  DDP içeriklerini sadece buradan güncelle.
  Her kutunun data-id değeri ile aşağıdaki key aynı olmalı.
*/

const flowData = {
  "customer-contact": {
    bo: "BO CODE HERE",
    title: "Customer Contact",
    summary: "Write short summary here.",
    ddps: [
      {
        code: "DDP-XXXXX",
        name: "DDP name here",
        detail: "What it does and why it matters."
      }
    ]
  },

  "automatic-prepping": {
    bo: "BO CODE HERE",
    title: "Automatic Preprepping",
    summary: "Write short summary here.",
    ddps: [
      {
        code: "DDP-XXXXX",
        name: "DDP name here",
        detail: "What it does and why it matters."
      }
    ]
  },

  "appointment-scheduled": {
    bo: "BO CODE HERE",
    title: "Appointment Scheduled",
    summary: "Write short summary here.",
    ddps: []
  },

  "atp-check-ic": {
    bo: "BO CODE HERE",
    title: "ATP Check - Interaction Center",
    summary: "Write short summary here.",
    ddps: []
  },

  "manual-prepping": {
    bo: "BO CODE HERE",
    title: "Manual Prepping",
    summary: "Write short summary here.",
    ddps: [
      {
        code: "DDP-58673",
        name: "Prepping categorizations and status",
        detail: "Update this text with your own explanation."
      },
      {
        code: "DDP-58674",
        name: "DDP name here",
        detail: "Update this text with your own explanation."
      }
    ]
  },

  "atp-check-bo": {
    bo: "BO CODE HERE",
    title: "ATP Check - Back Office",
    summary: "Write short summary here.",
    ddps: []
  },

  "sps": {
    bo: "BO CODE HERE",
    title: "SPS",
    summary: "Write short summary here.",
    ddps: []
  },

  "escalation-bo": {
    bo: "BO CODE HERE",
    title: "Escalation - Back Office",
    summary: "Write short summary here.",
    ddps: []
  },

  "appointment-rescheduling": {
    bo: "BO CODE HERE",
    title: "Appointment Rescheduling Required",
    summary: "Write short summary here.",
    ddps: []
  },

  "follow-up-appointment": {
    bo: "BO CODE HERE",
    title: "Follow-Up Appointment Scheduled",
    summary: "Write short summary here.",
    ddps: []
  },

  "spare-part-delivery": {
    bo: "BO CODE HERE",
    title: "Spare Part Delivery",
    summary: "Write short summary here.",
    ddps: []
  },

  "escalation-logistics": {
    bo: "BO CODE HERE",
    title: "Escalation - Logistics",
    summary: "Write short summary here.",
    ddps: []
  },

  "parts-delivered": {
    bo: "BO CODE HERE",
    title: "Parts Delivered",
    summary: "Write short summary here.",
    ddps: []
  },

  "part-missing": {
    bo: "BO CODE HERE",
    title: "Part Missing",
    summary: "Write short summary here.",
    ddps: []
  },

  "customer-visit": {
    bo: "BO CODE HERE",
    title: "Customer Visit",
    summary: "Write short summary here.",
    ddps: []
  },

  "repair": {
    bo: "BO CODE HERE",
    title: "Repair",
    summary: "Write short summary here.",
    ddps: []
  },

  "consumption": {
    bo: "BO CODE HERE",
    title: "Consumption",
    summary: "Write short summary here.",
    ddps: []
  },

  "unused-return": {
    bo: "BO CODE HERE",
    title: "Unused Return",
    summary: "Write short summary here.",
    ddps: []
  },

  "send-back-factory": {
    bo: "BO CODE HERE",
    title: "Send Back to Factory",
    summary: "Write short summary here.",
    ddps: []
  }
};

let activeHotspot = null;

const popup = document.getElementById("popup");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");

document.querySelectorAll(".hotspot").forEach(hotspot => {
  hotspot.addEventListener("click", e => {
    e.stopPropagation();

    const id = hotspot.dataset.id;
    const data = flowData[id];

    if (!data) {
      alert("No data found for: " + id);
      return;
    }

    if (activeHotspot) {
      activeHotspot.classList.remove("active");
    }

    activeHotspot = hotspot;
    hotspot.classList.add("active");

    renderPopup(data);
    positionPopup(hotspot);

    popup.style.display = "block";
    overlay.style.display = "block";
  });
});

function renderPopup(data) {
  document.getElementById("popupBO").textContent = data.bo || "";
  document.getElementById("popupTitle").textContent = data.title || "";
  document.getElementById("popupSummary").textContent = data.summary || "";

  const ddpList = document.getElementById("ddpList");
  ddpList.innerHTML = "";

  if (!data.ddps || data.ddps.length === 0) {
    ddpList.innerHTML = `<div style="color:#777; font-size:13px;">No DDP added yet.</div>`;
    return;
  }

  data.ddps.forEach(ddp => {
    const item = document.createElement("div");
    item.className = "ddp-item";

    item.innerHTML = `
      <div class="ddp-header">
        <span class="ddp-code">${ddp.code}</span>
        <span class="ddp-name">${ddp.name}</span>
      </div>
      <div class="ddp-detail">${ddp.detail}</div>
    `;

    item.querySelector(".ddp-header").addEventListener("click", () => {
      item.classList.toggle("open");
    });

    ddpList.appendChild(item);
  });
}

function positionPopup(hotspot) {
  const rect = hotspot.getBoundingClientRect();

  const popupWidth = 360;
  const popupHeight = 420;

  let left = rect.right + 12;
  let top = rect.top;

  if (left + popupWidth > window.innerWidth) {
    left = rect.left - popupWidth - 12;
  }

  if (top + popupHeight > window.innerHeight) {
    top = window.innerHeight - popupHeight - 16;
  }

  if (left < 16) left = 16;
  if (top < 16) top = 16;

  popup.style.left = left + "px";
  popup.style.top = top + "px";
}

function closePopup() {
  popup.style.display = "none";
  overlay.style.display = "none";

  if (activeHotspot) {
    activeHotspot.classList.remove("active");
    activeHotspot = null;
  }
}

closeBtn.addEventListener("click", closePopup);
overlay.addEventListener("click", closePopup);

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePopup();
});
</script>

</body>
</html>
