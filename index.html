<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logistics Flow</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0e0e0e;
  font-family: Arial, sans-serif;
  color: white;
}

/* IMAGE */
.container {
  position: relative;
  max-width: 1500px;
  margin: 20px auto;
}

.container img {
  width: 100%;
  display: block;
}

/* PIN */
.info-pin {
  all: unset;
  position: absolute;
  width: 12px;
  height: 12px;
  background: #E84525;
  border: 2px solid #fff;
  border-radius: 50%;
  cursor: pointer;
  transform: translate(-50%, -50%);
  z-index: 10;
  box-shadow: 0 0 0 4px rgba(232, 69, 37, 0.2);
}

.info-pin:hover {
  transform: translate(-50%, -50%) scale(1.5);
}

/* POPUP */
#popup {
  display: none;
  position: fixed;
  width: 320px;
  background: #1a1a1a;
  border: 1px solid #E84525;
  border-radius: 10px;
  padding: 16px;
  z-index: 999;
}

#popup h3 {
  margin-bottom: 6px;
}

.ddp {
  margin-top: 10px;
  border-top: 1px solid #333;
  padding-top: 8px;
  cursor: pointer;
}

.ddp-detail {
  display: none;
  color: #aaa;
  font-size: 13px;
}

.ddp.open .ddp-detail {
  display: block;
}
</style>
</head>

<body>

<div class="container">

  <img src="flow.png">

  <!-- PINLER (sadece left/top değiştir) -->

  <button class="info-pin" data-id="customer-contact" style="left:28%; top:15%;"></button>
  <button class="info-pin" data-id="automatic-prepping" style="left:35%; top:15%;"></button>
  <button class="info-pin" data-id="appointment-scheduled" style="left:42%; top:15%;"></button>

  <button class="info-pin" data-id="manual-prepping" style="left:42%; top:30%;"></button>
  <button class="info-pin" data-id="sps" style="left:53%; top:30%;"></button>

  <button class="info-pin" data-id="delivery" style="left:53%; top:55%;"></button>

  <button class="info-pin" data-id="repair" style="left:60%; top:85%;"></button>

</div>

<div id="popup"></div>

<script>

/* BURAYI SEN DOLDURACAKSIN */
const flowData = {
  "manual-prepping": {
    title: "Manual Prepping",
    summary: "Write your own description",
    ddps: [
      {
        code: "DDP-XXXXX",
        name: "DDP name",
        detail: "Explain what it does"
      }
    ]
  },

  "sps": {
    title: "SPS",
    summary: "Write your own description",
    ddps: []
  }
};

/* LOGIC */
const popup = document.getElementById("popup");

document.querySelectorAll(".info-pin").forEach(pin => {
  pin.addEventListener("click", e => {

    const id = pin.dataset.id;
    const data = flowData[id];

    if (!data) return;

    let html = `<h3>${data.title}</h3><p>${data.summary}</p>`;

    data.ddps.forEach(d => {
      html += `
        <div class="ddp">
          <b>${d.code}</b> - ${d.name}
          <div class="ddp-detail">${d.detail}</div>
        </div>
      `;
    });

    popup.innerHTML = html;
    popup.style.display = "block";

    popup.style.left = e.pageX + "px";
    popup.style.top = e.pageY + "px";
  });
});

/* DDP expand */
document.addEventListener("click", e => {
  if (e.target.closest(".ddp")) {
    e.target.closest(".ddp").classList.toggle("open");
  } else if (!e.target.closest(".info-pin")) {
    popup.style.display = "none";
  }
});

</script>

</body>
</html>
