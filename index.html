<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logistics Flow</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    font-family: Arial, sans-serif;
    color: white;
  }

  .diagram-wrapper {
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
  }

  .diagram-container {
    position: relative;
    width: 100%;
  }

  .diagram-container img {
    width: 100%;
    display: block;
  }

  .hotspot {
    position: absolute;
    z-index: 5;
    cursor: pointer;
    border-radius: 4px;
    background: transparent;
  }

  .hotspot:hover {
    background: rgba(232, 69, 37, 0.14);
    box-shadow: 0 0 0 2px rgba(232, 69, 37, 0.75);
  }

  .hotspot.active {
    background: rgba(232, 69, 37, 0.22);
    box-shadow: 0 0 0 2px #E84525;
  }

  /* Debug yapmak istersen sadece bunu aç */
  /*
  .hotspot {
    background: rgba(255, 0, 0, 0.12);
    border: 2px solid red;
  }
  */

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 900;
  }

  #popup {
    display: none;
    position: fixed;
    z-index: 1000;
    width: 360px;
    max-height: 80vh;
    overflow-y: auto;
    background: #1a1a1a;
    border: 1px solid rgba(232,69,37,0.5);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .popup-header {
    padding: 16px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .bo-tag {
    display: inline-block;
    margin-bottom: 8px;
    padding: 3px 8px;
    color: #E84525;
    background: rgba(232,69,37,0.12);
    border: 1px solid rgba(232,69,37,0.35);
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
  }

  .popup-title {
    font-size: 17px;
    font-weight: bold;
    line-height: 1.3;
  }

  .close-btn {
    background: none;
    border: none;
    color: #aaa;
    font-size: 22px;
    cursor: pointer;
  }

  .popup-body {
    padding: 16px;
  }

  .popup-summary {
    color: #ccc;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .ddp-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .ddp-item {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .ddp-header {
    padding: 10px;
    cursor: pointer;
    display: flex;
    gap: 8px;
  }

  .ddp-header:hover {
    background: rgba(255,255,255,0.04);
  }

  .ddp-code {
    color: #E84525;
    font-weight: bold;
    font-size: 12px;
    white-space: nowrap;
  }

  .ddp-name {
    color: #ddd;
    font-size: 13px;
  }

  .ddp-detail {
    display: none;
    padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    color: #aaa;
    font-size: 13px;
    line-height: 1.5;
    background: rgba(0,0,0,0.25);
  }

  .ddp-item.open .ddp-detail {
    display: block;
  }
</style>
</head>

<body>

<div class="diagram-wrapper">
  <div class="diagram-container">

    <img src="flow.png" alt="Logistics Flow Diagram" />

    <!-- Interaction Center -->
    <div class="hotspot" data-id="start" style="left:15.6%; top:13.2%; width:5.8%; height:5.2%;"></div>
    <div class="hotspot" data-id="customer-contact" style="left:25.1%; top:10.7%; width:6.0%; height:8.8%;"></div>
    <div class="hotspot" data-id="automatic-prepping" style="left:32.0%; top:10.7%; width:6.1%; height:8.8%;"></div>
    <div class="hotspot" data-id="appointment-scheduled" style="left:38.7%; top:10.7%; width:6.2%; height:8.8%;"></div>
    <div class="hotspot" data-id="atp-check-ic" style="left:43.3%; top:7.1%; width:6.1%; height:4.3%;"></div>

    <!-- Back Office -->
    <div class="hotspot" data-id="manual-prepping" style="left:38.7%; top:24.5%; width:6.2%; height:8.8%;"></div>
    <div class="hotspot" data-id="atp-check-bo" style="left:43.1%; top:24.2%; width:6.2%; height:4.0%;"></div>
    <div class="hotspot" data-id="sps" style="left:50.2%; top:24.5%; width:6.3%; height:8.8%;"></div>
    <div class="hotspot" data-id="escalation-bo" style="left:54.7%; top:24.0%; width:6.3%; height:4.1%;"></div>
    <div class="hotspot" data-id="appointment-rescheduling" style="left:66.0%; top:24.5%; width:6.5%; height:8.8%;"></div>
    <div class="hotspot" data-id="follow-up-appointment" style="left:66.0%; top:39.0%; width:6.5%; height:8.8%;"></div>

    <!-- Logistics -->
    <div class="hotspot" data-id="spare-part-delivery" style="left:50.2%; top:52.8%; width:6.3%; height:8.7%;"></div>
    <div class="hotspot" data-id="escalation-logistics" style="left:54.7%; top:51.5%; width:6.3%; height:4.1%;"></div>

    <!-- Technician -->
    <div class="hotspot" data-id="parts-delivered" style="left:50.2%; top:69.7%; width:6.3%; height:8.8%;"></div>
    <div class="hotspot" data-id="customer-visit" style="left:50.2%; top:82.0%; width:6.3%; height:8.8%;"></div>
    <div class="hotspot" data-id="repair" style="left:58.2%; top:82.0%; width:6.4%; height:8.8%;"></div>
    <div class="hotspot" data-id="consumption" style="left:66.0%; top:82.0%; width:6.5%; height:8.8%;"></div>
    <div class="hotspot" data-id="part-missing" style="left:66.0%; top:69.7%; width:6.5%; height:8.8%;"></div>
    <div class="hotspot" data-id="unused-return" style="left:78.5%; top:76.0%; width:6.5%; height:8.8%;"></div>
    <div class="hotspot" data-id="send-back-factory" style="left:78.5%; top:88.0%; width:6.5%; height:8.8%;"></div>
    <div class="hotspot" data-id="end" style="left:91.0%; top:82.4%; width:5.8%; height:5.4%;"></div>

  </div>
</div>

<div id="overlay"></div>

<div id="popup">
  <div class="popup-header">
    <div>
      <div class="bo-tag" id="popupBO"></div>
      <div class="popup-title" id="popupTitle"></div>
    </div>
    <button class="close-btn" id="closeBtn">&times;</button>
  </div>

  <div class="popup-body">
    <p class="popup-summary" id="popupSummary"></p>
    <div class="ddp-label">Related DDPs</div>
    <div id="ddpList"></div>
  </div>
</div>

<script>
const flowData = {
  "start": {
    bo: "START",
    title: "Start",
    summary: "Process starts here.",
    ddps: []
  },

  "customer-contact": {
    bo: "BO CODE HERE",
    title: "Customer Contact",
    summary: "Write short summary here.",
    ddps: []
  },

  "automatic-prepping": {
    bo: "BO CODE HERE",
    title: "Automatic Preprepping",
    summary: "Write short summary here.",
    ddps: []
  },

  "appointment-scheduled": {
    bo: "BO CODE HERE",
    title: "Appointment Scheduled",
    summary: "Write short summary here.",
    ddps: []
  },

  "atp-check-ic": {
    bo: "BO CODE HERE",
    title: "ATP Check",
    summary: "Write short summary here.",
    ddps: []
  },

  "manual-prepping": {
    bo: "BO CODE HERE",
    title: "Manual Prepping",
    summary: "Write short summary here.",
    ddps: [
      {
        code: "DDP-XXXXX",
        name: "DDP name here",
        detail: "What it does and why it matters."
      }
    ]
  },

  "atp-check-bo": {
    bo: "BO CODE HERE",
    title: "ATP Check",
    summary: "Write short summary here.",
    ddps: []
  },

  "sps": {
    bo: "BO CODE HERE",
    title: "SPS - Spare Part Reservation",
    summary: "Write short summary here.",
    ddps: []
  },

  "escalation-bo": {
    bo: "BO CODE HERE",
    title: "Escalation",
    summary: "Write short summary here.",
    ddps: []
  },

  "appointment-rescheduling": {
    bo: "BO CODE HERE",
    title: "Appointment Rescheduling Required",
    summary: "Write short summary here.",
    ddps: []
  },

  "follow-up-appointment": {
    bo: "BO CODE HERE",
    title: "Follow-Up Appointment Scheduled",
    summary: "Write short summary here.",
    ddps: []
  },

  "spare-part-delivery": {
    bo: "BO CODE HERE",
    title: "Spare Part Delivery",
    summary: "Write short summary here.",
    ddps: []
  },

  "escalation-logistics": {
    bo: "BO CODE HERE",
    title: "Escalation",
    summary: "Write short summary here.",
    ddps: []
  },

  "parts-delivered": {
    bo: "BO CODE HERE",
    title: "Parts Delivered",
    summary: "Write short summary here.",
    ddps: []
  },

  "customer-visit": {
    bo: "BO CODE HERE",
    title: "Customer Visit",
    summary: "Write short summary here.",
    ddps: []
  },

  "repair": {
    bo: "BO CODE HERE",
    title: "Repair",
    summary: "Write short summary here.",
    ddps: []
  },

  "consumption": {
    bo: "BO CODE HERE",
    title: "Consumption",
    summary: "Write short summary here.",
    ddps: []
  },

  "part-missing": {
    bo: "BO CODE HERE",
    title: "Part Missing",
    summary: "Write short summary here.",
    ddps: []
  },

  "unused-return": {
    bo: "BO CODE HERE",
    title: "Unused Return",
    summary: "Write short summary here.",
    ddps: []
  },

  "send-back-factory": {
    bo: "BO CODE HERE",
    title: "Send Back to Factory",
    summary: "Write short summary here.",
    ddps: []
  },

  "end": {
    bo: "END",
    title: "End",
    summary: "Process ends here.",
    ddps: []
  }
};

let activeHotspot = null;

const popup = document.getElementById("popup");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");

document.querySelectorAll(".hotspot").forEach(hotspot => {
  hotspot.addEventListener("click", e => {
    e.stopPropagation();

    const id = hotspot.dataset.id;
    const data = flowData[id];

    if (!data) return;

    if (activeHotspot) {
      activeHotspot.classList.remove("active");
    }

    activeHotspot = hotspot;
    hotspot.classList.add("active");

    renderPopup(data);
    positionPopup(hotspot);

    popup.style.display = "block";
    overlay.style.display = "block";
  });
});

function renderPopup(data) {
  document.getElementById("popupBO").textContent = data.bo;
  document.getElementById("popupTitle").textContent = data.title;
  document.getElementById("popupSummary").textContent = data.summary;

  const ddpList = document.getElementById("ddpList");
  ddpList.innerHTML = "";

  if (!data.ddps || data.ddps.length === 0) {
    ddpList.innerHTML = `<div style="font-size:13px;color:#777;">No DDP added yet.</div>`;
    return;
  }

  data.ddps.forEach(ddp => {
    const item = document.createElement("div");
    item.className = "ddp-item";

    item.innerHTML = `
      <div class="ddp-header">
        <span class="ddp-code">${ddp.code}</span>
        <span class="ddp-name">${ddp.name}</span>
      </div>
      <div class="ddp-detail">${ddp.detail}</div>
    `;

    item.querySelector(".ddp-header").addEventListener("click", () => {
      item.classList.toggle("open");
    });

    ddpList.appendChild(item);
  });
}

function positionPopup(hotspot) {
  const rect = hotspot.getBoundingClientRect();

  const popupWidth = 360;
  const popupHeight = 420;

  let left = rect.right + 12;
  let top = rect.top;

  if (left + popupWidth > window.innerWidth) {
    left = rect.left - popupWidth - 12;
  }

  if (top + popupHeight > window.innerHeight) {
    top = window.innerHeight - popupHeight - 16;
  }

  if (left < 16) left = 16;
  if (top < 16) top = 16;

  popup.style.left = left + "px";
  popup.style.top = top + "px";
}

function closePopup() {
  popup.style.display = "none";
  overlay.style.display = "none";

  if (activeHotspot) {
    activeHotspot.classList.remove("active");
    activeHotspot = null;
  }
}

closeBtn.addEventListener("click", closePopup);
overlay.addEventListener("click", closePopup);

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePopup();
});
</script>

</body>
</html>
