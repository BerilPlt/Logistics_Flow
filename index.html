<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paramount Logistics</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f6f7f9;
    color: #172033;
  }

  .wrap {
    padding: 0;
    overflow: auto;
    width: 100vw;
    min-height: 100vh;
    background: #f6f7f9;
  }

  .flow-shell {
    position: relative;
    width: 1600px;
    min-width: 1600px;
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
    background: white;
    box-shadow: none;
  }

  .flow-image {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
  }

  .hotspot {
    position: absolute;
    border: 2px solid transparent;
    border-radius: 8px;
    background: rgba(242, 106, 33, 0);
    cursor: pointer;
    z-index: 3;
  }

  .hotspot:hover,
  .hotspot.active {
    border-color: #ff5f36;
    background: rgba(255, 95, 54, 0.16);
    box-shadow: 0 0 0 4px rgba(255, 95, 54, 0.16);
  }

  .popup {
    position: absolute;
    width: 420px;
    max-height: 600px;
    overflow: auto;
    background: #fff;
    border: 1px solid #d6dbe5;
    border-radius: 18px;
    box-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
    z-index: 20;
    display: none;
  }

  .popup.open { display: block; }

  .popup-header {
    position: sticky;
    top: 0;
    background: linear-gradient(135deg, #111827, #374151);
    color: white;
    padding: 16px 18px;
    z-index: 1;
  }

  .popup-close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  .popup-kicker {
    font-size: 11px;
    opacity: 0.82;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }

  .popup-title {
    margin: 0;
    font-size: 18px;
    line-height: 1.25;
    padding-right: 34px;
  }

  .popup-body {
    padding: 18px 20px 20px;
  }

  .summary {
    margin: 0 0 18px;
    color: #374151;
    line-height: 1.65;
    font-size: 14px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7280;
    margin: 18px 0 8px;
  }

  .ddp-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ddp-item {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }

  .ddp-button {
    width: 100%;
    border: none;
    background: #f9fafb;
    padding: 11px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    text-align: left;
    color: #111827;
  }

  .ddp-code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    color: #2563eb;
    font-weight: 800;
    white-space: nowrap;
  }

  .ddp-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    flex: 1;
  }

  .chevron {
    color: #6b7280;
    font-weight: 900;
    transition: transform 0.16s ease;
  }

  .ddp-item.expanded .chevron { transform: rotate(90deg); }

  .ddp-detail {
    display: none;
    padding: 12px 14px 14px;
    font-size: 13px;
    color: #4b5563;
    line-height: 1.6;
    background: #fff;
    border-top: 1px solid #e5e7eb;
  }

  .ddp-item.expanded .ddp-detail { display: block; }

  .empty-state {
    padding: 12px;
    border-radius: 12px;
    background: #f9fafb;
    color: #6b7280;
    font-size: 13px;
    line-height: 1.45;
  }

  .note {
    margin-top: 14px;
    padding: 12px;
    border-left: 4px solid #ff5f36;
    background: #fff3ea;
    border-radius: 8px;
    color: #6b3b18;
    font-size: 12px;
    line-height: 1.45;
  }
</style>
</head>

const shell = document.getElementById("flowShell");
const popup = document.getElementById("popup");
const popupClose = document.getElementById("popupClose");
const popupKicker = document.getElementById("popupKicker");
const popupTitle = document.getElementById("popupTitle");
const popupSummary = document.getElementById("popupSummary");
const ddpList = document.getElementById("ddpList");

function openPopup(stepKey, hotspot) {
  const data = flowData[stepKey];
  if (!data) return;

  document.querySelectorAll(".hotspot.active").forEach(h => h.classList.remove("active"));
  hotspot.classList.add("active");

  popupKicker.textContent = data.bo;
  popupTitle.textContent = data.title;
  popupSummary.textContent = data.summary;
  ddpList.innerHTML = "";

  if (!data.ddps || data.ddps.length === 0) {
    ddpList.innerHTML = `<div class="empty-state">Bu adım için henüz DDP/requirement eklenmedi.</div>`;
  } else {
    data.ddps.forEach((ddp) => {
      const item = document.createElement("div");
      item.className = "ddp-item";
      item.innerHTML = `
        <button class="ddp-button" type="button">
          <span class="ddp-code">${ddp.code}</span>
          <span class="ddp-name">${ddp.name}</span>
          <span class="chevron">›</span>
        </button>
        <div class="ddp-detail">${ddp.detail}</div>
      `;
      item.querySelector(".ddp-button").addEventListener("click", (event) => {
        event.stopPropagation();
        item.classList.toggle("expanded");
      });
      ddpList.appendChild(item);
    });
  }

  const shellRect = shell.getBoundingClientRect();
  const hRect = hotspot.getBoundingClientRect();

  let left = hRect.right - shellRect.left + 12;
  let top = hRect.top - shellRect.top - 10;

  if (left + 420 > shell.clientWidth - 16) left = hRect.left - shellRect.left - 432;
  if (left < 16) left = 16;
  if (top + 560 > shell.clientHeight - 16) top = shell.clientHeight - 576;
  if (top < 16) top = 16;

  popup.style.left = `${left}px`;
  popup.style.top = `${top}px`;
  popup.classList.add("open");
  popup.setAttribute("aria-hidden", "false");
}

document.querySelectorAll(".hotspot").forEach((hotspot) => {
  hotspot.addEventListener("click", (event) => {
    event.stopPropagation();
    openPopup(hotspot.dataset.step, hotspot);
  });
});

popupClose.addEventListener("click", () => {
  popup.classList.remove("open");
  popup.setAttribute("aria-hidden", "true");
  document.querySelectorAll(".hotspot.active").forEach(h => h.classList.remove("active"));
});

document.addEventListener("click", (event) => {
  if (!popup.contains(event.target)) {
    popup.classList.remove("open");
    popup.setAttribute("aria-hidden", "true");
    document.querySelectorAll(".hotspot.active").forEach(h => h.classList.remove("active"));
  }
});
